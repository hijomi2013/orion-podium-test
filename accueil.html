<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Orion - Accueil</title>
    <link rel="stylesheet" href="accueil.css">
  </head>
  <body>
    <main class="home" aria-labelledby="home-title">
      <header class="hero">
        <img class="brand-logo" src="assets/ui/logo-orion-complet.png" alt="Orion">
        <h1 id="home-title">Votre espace optique</h1>
        <p>Lentilles, verres, solaire et offres en un seul endroit.</p>
      </header>

      <section class="cards" aria-label="Univers Orion">
        <article class="card card-lentilles" tabindex="0">
          <div class="card-inner">
            <div class="card-face card-front">
              <div class="visual" aria-hidden="true">
                <img class="category-image category-lens" src="assets/ui/accueil-lentilles.jpg" alt="">
              </div>
              <p class="card-kicker">Univers</p>
              <h2>Lentilles</h2>
              <span class="title-line"></span>
              <p class="card-copy">Offres, garanties et produits</p>
              <span class="round-arrow" aria-hidden="true">&rarr;</span>
            </div>
            <div class="card-face card-back">
              <p class="card-kicker">Sélection</p>
              <h2>Lentilles</h2>
              <span class="title-line"></span>
              <div class="card-options" aria-label="Options Lentilles">
                <button type="button" disabled><i class="mini mini-tag"></i><span>Offre</span><b>&rsaquo;</b></button>
                <button type="button" disabled><i class="mini mini-shield"></i><span>Garantie</span><b>&rsaquo;</b></button>
                <button type="button" disabled><i class="mini mini-box"></i><span>Produits</span><b>&rsaquo;</b></button>
                <button type="button" disabled><i class="mini mini-plus"></i><span>Offres 3+1</span><b>&rsaquo;</b></button>
              </div>
              <span class="round-arrow" aria-hidden="true">&rarr;</span>
            </div>
          </div>
        </article>

        <article class="card card-verres" tabindex="0">
          <div class="card-inner">
            <div class="card-face card-front">
              <div class="visual" aria-hidden="true">
                <img class="category-image category-glasses" src="assets/ui/accueil-verres.webp" alt="">
              </div>
              <p class="card-kicker">Univers</p>
              <h2>Verres</h2>
              <span class="title-line"></span>
              <p class="card-copy">Conseils, choix et accompagnement</p>
              <span class="round-arrow" aria-hidden="true">&rarr;</span>
            </div>
            <div class="card-face card-back">
              <p class="card-kicker">Sélection</p>
              <h2>Verres</h2>
              <span class="title-line"></span>
              <div class="card-options" aria-label="Options Verres">
                <button type="button" data-href="podium.html"><i class="mini mini-podium"></i><span>Podium</span><b>&rsaquo;</b></button>
                <button type="button" disabled><i class="mini mini-shield"></i><span>SAV</span><b>&rsaquo;</b></button>
              </div>
              <span class="round-arrow" aria-hidden="true">&rarr;</span>
            </div>
          </div>
        </article>

        <article class="card card-solaire" tabindex="0">
          <div class="card-inner">
            <div class="card-face card-front">
              <div class="visual" aria-hidden="true">
                <img class="category-image category-sunglasses" src="assets/ui/accueil-solaire.avif" alt="">
              </div>
              <p class="card-kicker">Univers</p>
              <h2>Solaire</h2>
              <span class="title-line"></span>
              <p class="card-copy">Protection et style</p>
              <span class="round-arrow" aria-hidden="true">&rarr;</span>
            </div>
            <div class="card-face card-back">
              <p class="card-kicker">Sélection</p>
              <h2>Solaire</h2>
              <span class="title-line"></span>
              <div class="card-options" aria-label="Options Solaire">
                <button type="button" disabled><i class="mini mini-sun"></i><span>Demetz</span><b>&rsaquo;</b></button>
                <button type="button" disabled><i class="mini mini-sun"></i><span>Oakley</span><b>&rsaquo;</b></button>
                <button type="button" disabled><i class="mini mini-sun"></i><span>Ray-Ban</span><b>&rsaquo;</b></button>
                <button type="button" disabled><i class="mini mini-sun"></i><span>Vuarnet</span><b>&rsaquo;</b></button>
                <button type="button" disabled><i class="mini mini-sun"></i><span>Bolle</span><b>&rsaquo;</b></button>
              </div>
              <span class="round-arrow" aria-hidden="true">&rarr;</span>
            </div>
          </div>
        </article>
      </section>
    </main>

    <script src="accueil.js"></script>
  </body>
</html>
